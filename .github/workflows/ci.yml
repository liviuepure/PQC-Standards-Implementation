name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd rust && cargo test --all

  go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: cd go && go test ./... -count=1 -timeout 300s

  javascript:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd js && node --test test/

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: cd python && python -m unittest discover -s tests -v

  java:
    name: Java Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: cd java && mvn test

  dotnet:
    name: C#/.NET Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - run: cd dotnet && dotnet test --configuration Release

  swift:
    name: Swift Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd swift && swift test

  php:
    name: PHP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl
      - run: cd php && composer install --no-interaction && ./vendor/bin/phpunit tests/

  rust-benchmarks:
    name: Rust Benchmark Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binaries
        run: cd rust && cargo build --release --all
      - name: Report binary sizes
        run: |
          echo "=== Release artifact sizes ==="
          find rust/target/release -maxdepth 2 \( -name "*.rlib" -o -name "lib*.a" \) | sort | while read f; do
            echo "$(du -sh "$f" | cut -f1)  $f"
          done || echo "(no rlib artifacts found)"
      - name: Run benchmarks
        run: cd rust && cargo bench -- --measurement-time 3 2>&1 | tee bench-output.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: rust/bench-output.txt
          retention-days: 30
